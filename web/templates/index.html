<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Gallery - Constraint Theory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .template-card {
            transition: all 0.3s ease;
        }
        .template-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .category-badge {
            transition: all 0.2s ease;
        }
        .category-badge:hover {
            transform: scale(1.05);
        }
        .template-preview {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.3);
        }
        .filter-active {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Navigation -->
    <nav class="fixed w-full top-0 z-50 bg-gray-900/95 backdrop-blur-sm border-b border-gray-800">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <a href="/" class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center">
                            <span class="text-white font-bold text-sm">CT</span>
                        </div>
                        <span class="text-xl font-bold">Template Gallery</span>
                    </a>
                </div>
                <div class="flex gap-3">
                    <a href="https://github.com/SuperInstance/constrainttheory" target="_blank" rel="noopener" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition">
                        GitHub
                    </a>
                    <a href="/simulators/" class="px-4 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 rounded-lg text-sm font-medium transition">
                        Simulators
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="pt-24 pb-8 px-4">
        <div class="container mx-auto max-w-7xl">
            <div class="text-center mb-8">
                <h1 class="text-4xl md:text-5xl font-bold mb-4">
                    <span class="gradient-text">Template Gallery</span>
                </h1>
                <p class="text-xl text-gray-400 max-w-2xl mx-auto">
                    50+ pre-built templates for geometric operations, visualizations, and research
                </p>
            </div>

            <!-- Search and Filters -->
            <div class="mb-8">
                <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="relative w-full md:w-96">
                        <input type="text" id="search-input" placeholder="Search templates..."
                               class="search-input w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-cyan-500 transition">
                        <svg class="absolute right-3 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                    <div class="flex flex-wrap gap-2" id="category-filters">
                        <button class="filter-btn filter-active px-4 py-2 rounded-lg text-sm font-medium transition" data-category="all">All</button>
                        <button class="filter-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition" data-category="geometry">Geometry</button>
                        <button class="filter-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition" data-category="calculus">Calculus</button>
                        <button class="filter-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition" data-category="graph">Graph Theory</button>
                        <button class="filter-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition" data-category="encoding">Encoding</button>
                        <button class="filter-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition" data-category="visualization">Visualization</button>
                        <button class="filter-btn px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-sm font-medium transition" data-category="research">Research</button>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-gray-800/50 rounded-lg p-4 text-center border border-gray-700">
                    <div class="text-3xl font-bold text-cyan-400" id="total-templates">50+</div>
                    <div class="text-sm text-gray-400">Templates</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-4 text-center border border-gray-700">
                    <div class="text-3xl font-bold text-green-400">6</div>
                    <div class="text-sm text-gray-400">Categories</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-4 text-center border border-gray-700">
                    <div class="text-3xl font-bold text-blue-400">100%</div>
                    <div class="text-sm text-gray-400">Open Source</div>
                </div>
                <div class="bg-gray-800/50 rounded-lg p-4 text-center border border-gray-700">
                    <div class="text-3xl font-bold text-purple-400">MIT</div>
                    <div class="text-sm text-gray-400">License</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Templates Grid -->
    <section class="px-4 pb-16">
        <div class="container mx-auto max-w-7xl">
            <div id="templates-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Templates will be loaded dynamically -->
            </div>

            <!-- No Results -->
            <div id="no-results" class="hidden text-center py-12">
                <div class="text-6xl mb-4">🔍</div>
                <h3 class="text-2xl font-semibold mb-2">No templates found</h3>
                <p class="text-gray-400">Try adjusting your search or filter criteria</p>
            </div>
        </div>
    </section>

    <!-- Template Modal -->
    <div id="template-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/80">
        <div class="bg-gray-800 rounded-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto border border-gray-700">
            <div class="sticky top-0 bg-gray-800 border-b border-gray-700 p-4 flex justify-between items-center">
                <h2 id="modal-title" class="text-2xl font-bold"></h2>
                <button onclick="closeModal()" class="p-2 hover:bg-gray-700 rounded-lg transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="modal-content" class="p-6">
                <!-- Modal content loaded dynamically -->
            </div>
        </div>
    </div>

    <script src="/templates/templates-data.js"></script>
    <script>
        // Template data and rendering
        let templates = [];
        let activeCategory = 'all';
        let searchQuery = '';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            templates = getTemplatesData();
            renderTemplates();
            setupEventListeners();
        });

        // Render templates
        function renderTemplates() {
            const grid = document.getElementById('templates-grid');
            const noResults = document.getElementById('no-results');

            let filtered = templates;

            // Apply category filter
            if (activeCategory !== 'all') {
                filtered = filtered.filter(t => t.category === activeCategory);
            }

            // Apply search filter
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(t =>
                    t.title.toLowerCase().includes(query) ||
                    t.description.toLowerCase().includes(query) ||
                    t.tags.some(tag => tag.toLowerCase().includes(query))
                );
            }

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = filtered.map(template => createTemplateCard(template)).join('');
        }

        // Create template card
        function createTemplateCard(template) {
            const difficultyColors = {
                beginner: 'bg-green-500/20 text-green-400 border-green-500/30',
                intermediate: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30',
                advanced: 'bg-red-500/20 text-red-400 border-red-500/30'
            };

            return `
                <div class="template-card bg-gray-800 rounded-xl border border-gray-700 overflow-hidden cursor-pointer"
                     onclick="openModal('${template.id}')">
                    <div class="template-preview h-40 flex items-center justify-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-br from-gray-800 to-gray-900"></div>
                        <div class="relative text-6xl">${template.icon}</div>
                        <div class="absolute top-2 right-2">
                            <span class="category-badge px-2 py-1 bg-gray-700/80 rounded text-xs font-medium">${template.categoryLabel}</span>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="text-lg font-semibold mb-2">${template.title}</h3>
                        <p class="text-gray-400 text-sm mb-3 line-clamp-2">${template.description}</p>
                        <div class="flex flex-wrap gap-1 mb-3">
                            ${template.tags.slice(0, 3).map(tag => `
                                <span class="px-2 py-0.5 bg-gray-700 rounded text-xs text-gray-300">${tag}</span>
                            `).join('')}
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="px-2 py-1 rounded text-xs border ${difficultyColors[template.difficulty]}">${template.difficulty}</span>
                            <span class="text-xs text-gray-500">${template.estimatedTime}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // Open modal
        function openModal(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            document.getElementById('modal-title').textContent = template.title;
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-6">
                    <div>
                        <div class="flex items-center gap-4 mb-4">
                            <span class="text-5xl">${template.icon}</span>
                            <div>
                                <p class="text-gray-400">${template.categoryLabel}</p>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="px-2 py-1 bg-gray-700 rounded text-xs">${template.difficulty}</span>
                                    <span class="text-xs text-gray-500">${template.estimatedTime}</span>
                                </div>
                            </div>
                        </div>
                        <p class="text-gray-300">${template.fullDescription || template.description}</p>
                    </div>

                    ${template.mathematicalFoundation ? `
                        <div class="bg-gray-900 rounded-lg p-4 border border-gray-700">
                            <h4 class="font-semibold mb-2 text-cyan-400">Mathematical Foundation</h4>
                            <div class="text-gray-300">${template.mathematicalFoundation}</div>
                        </div>
                    ` : ''}

                    <div>
                        <h4 class="font-semibold mb-3">Code Example</h4>
                        <div class="bg-gray-900 rounded-lg overflow-hidden border border-gray-700">
                            <div class="bg-gray-800 px-4 py-2 border-b border-gray-700 flex justify-between items-center">
                                <span class="text-sm text-gray-400">${template.codeLanguage || 'javascript'}</span>
                                <button onclick="copyCode('${template.id}')" class="text-xs text-cyan-400 hover:text-cyan-300">Copy Code</button>
                            </div>
                            <pre class="p-4 text-sm overflow-x-auto"><code id="code-${template.id}">${escapeHtml(template.code)}</code></pre>
                        </div>
                    </div>

                    ${template.useCases ? `
                        <div>
                            <h4 class="font-semibold mb-3">Use Cases</h4>
                            <ul class="space-y-2">
                                ${template.useCases.map(uc => `
                                    <li class="flex items-start gap-2">
                                        <svg class="w-5 h-5 text-green-400 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                                        </svg>
                                        <span class="text-gray-300">${uc}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    <div class="flex flex-wrap gap-2">
                        ${template.tags.map(tag => `
                            <span class="px-3 py-1 bg-gray-700 rounded-full text-sm text-gray-300">${tag}</span>
                        `).join('')}
                    </div>

                    <div class="flex gap-3 pt-4 border-t border-gray-700">
                        ${template.simulatorLink ? `
                            <a href="${template.simulatorLink}" class="flex-1 py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 rounded-lg text-center font-semibold transition">
                                Try in Simulator
                            </a>
                        ` : ''}
                        <button onclick="downloadTemplate('${template.id}')" class="flex-1 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-semibold transition">
                            Download Template
                        </button>
                        <button onclick="exportAsPDF('${template.id}')" class="px-4 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg transition" title="Export as PDF">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </button>
                        <button onclick="exportAsLaTeX('${template.id}')" class="px-4 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg transition" title="Export as LaTeX">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('template-modal').classList.remove('hidden');
            document.getElementById('template-modal').classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            document.getElementById('template-modal').classList.add('hidden');
            document.getElementById('template-modal').classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderTemplates();
            });

            // Category filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('filter-active');
                        b.classList.add('bg-gray-800');
                    });
                    btn.classList.add('filter-active');
                    btn.classList.remove('bg-gray-800');
                    activeCategory = btn.dataset.category;
                    renderTemplates();
                });
            });

            // Close modal on escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });

            // Close modal on backdrop click
            document.getElementById('template-modal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('template-modal')) {
                    closeModal();
                }
            });
        }

        // Copy code
        function copyCode(templateId) {
            const code = document.getElementById(`code-${templateId}`).textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        // Download template
        function downloadTemplate(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            const content = `# ${template.title}

${template.fullDescription || template.description}

## Code Example

\`\`\`${template.codeLanguage || 'javascript'}
${template.code}
\`\`\`

## Tags
${template.tags.join(', ')}

---
Generated by Constraint Theory Template Gallery
`;

            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${template.id}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Export as PDF (uses browser print)
        function exportAsPDF(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>${template.title} - Constraint Theory Template</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
                        h1 { color: #0891b2; }
                        pre { background: #f3f4f6; padding: 16px; border-radius: 8px; overflow-x: auto; }
                        code { font-family: monospace; }
                        .tag { display: inline-block; background: #e5e7eb; padding: 4px 12px; border-radius: 9999px; margin: 2px; font-size: 12px; }
                    </style>
                </head>
                <body>
                    <h1>${template.icon} ${template.title}</h1>
                    <p><strong>Category:</strong> ${template.categoryLabel} | <strong>Difficulty:</strong> ${template.difficulty}</p>
                    <p>${template.fullDescription || template.description}</p>
                    ${template.mathematicalFoundation ? `<h2>Mathematical Foundation</h2><p>${template.mathematicalFoundation}</p>` : ''}
                    <h2>Code Example</h2>
                    <pre><code>${template.code}</code></pre>
                    <h2>Tags</h2>
                    <div>${template.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <hr>
                    <p><em>Generated by Constraint Theory Template Gallery</em></p>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        // Export as LaTeX
        function exportAsLaTeX(templateId) {
            const template = templates.find(t => t.id === templateId);
            if (!template) return;

            const latex = `\\documentclass{article}
\\usepackage{amsmath}
\\usepackage{listings}
\\usepackage{hyperref}

\\title{${template.title}}
\\author{Constraint Theory Template Gallery}

\\begin{document}
\\maketitle

\\section*{Description}
${template.fullDescription || template.description}

${template.mathematicalFoundation ? `\\section*{Mathematical Foundation}
${template.mathematicalFoundation}` : ''}

\\section*{Code Example}
\\begin{lstlisting}[language=${template.codeLanguage || 'Python'}]
${template.code}
\\end{lstlisting}

\\section*{Tags}
${template.tags.map(t => `\\texttt{${t}}`).join(', ')}

\\end{document}
`;

            const blob = new Blob([latex], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${template.id}.tex`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
