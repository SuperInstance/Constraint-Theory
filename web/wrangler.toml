name = "constraint-theory"
main = "workers/dist/index.js"
workers_dev = true
compatibility_date = "2024-01-01"

[build]
command = "cd workers && npm install && npm run build"

[dev]
port = 8787
local_protocol = "http"

# Production environment - constraint-theory.superinstance.ai
[env.production]
routes = [
  { pattern = "https://constraint-theory.superinstance.ai/*", zone_name = "superinstance.ai" }
]

[env.production.vars]
ENVIRONMENT = "production"
API_VERSION = "v1"
CORS_ORIGIN = "https://constraint-theory.superinstance.ai"

# KV namespaces (create these first, then uncomment)
# [[env.production.kv_namespaces]]
# binding = "SESSION_STORE"
# id = "your_kv_namespace_id_here"
#
# [[env.production.kv_namespaces]]
# binding = "CACHE"
# id = "your_kv_namespace_id_here"

# Staging environment
[env.staging.vars]
ENVIRONMENT = "staging"
API_VERSION = "v1"
CORS_ORIGIN = "https://staging.constraint-theory.superinstance.ai"

# Development environment
[env.development.vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
CORS_ORIGIN = "*"
